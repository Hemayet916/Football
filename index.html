<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Match Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      color: #222;
    }
    header {
      background-color: #1e3a8a;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    main {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    #matchTypeLabel {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin: 1rem 0;
    }
    #matchTime {
      font-size: 2.5rem;
      font-weight: bold;
      text-align: center;
      color: #dc2626;
      margin-bottom: 1rem;
    }
    #pitchDisplay {
      width: 100%;
      height: 400px;
      background: linear-gradient(#4ade80, #22c55e);
      border: 4px solid #000;
      margin-bottom: 2rem;
      position: relative;
    }
    .controls {
      text-align: center;
      margin-top: 1rem;
    }
    .controls input[type="file"] {
      padding: 0.5rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Soccer Match Viewer</h1>
  </header>
  <main>
    <div id="matchTypeLabel">MATCH TYPE</div>
    <div id="matchTime">0′</div>
    <div id="pitchDisplay"></div>
    <div class="controls">
      <input type="file" id="loadMatchBtn" accept=".json" />
    </div>
  </main>
  <script src="viewer.js"></script>
</body>
</html>
